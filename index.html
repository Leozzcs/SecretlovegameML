<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>❤️ Sistema Secreto ❤️</title>

<style>

body{
    background: linear-gradient(135deg, #1a0000, #330000);
    color: white;
    font-family: Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.container{
    background-color: #2b0000;
    padding: 40px;
    border: 4px solid #ff1e1e;
    border-radius: 20px;
    box-shadow: 0 0 30px rgba(255,0,0,0.5);
    width: 420px;
    text-align: center;
    position: relative;
}

.container::before{
    content: "❤️";
    position: absolute;
    top: -15px;
    left: -15px;
    font-size: 25px;
}

.container::after{
    content: "❤️";
    position: absolute;
    bottom: -15px;
    right: -15px;
    font-size: 25px;
}

.pergunta{
    display: none;
    margin-top: 15px;
}

input{
    padding: 10px;
    margin-top: 10px;
    width: 90%;
    border-radius: 10px;
    border: none;
    text-align: center;
}

button{
    margin-top: 10px;
    padding: 8px 15px;
    border-radius: 10px;
    border: none;
    background-color: #ff1e1e;
    color: white;
    cursor: pointer;
}

button:hover{
    background-color: #ff4d4d;
}

#resultado{
    display: none;
    margin-top: 20px;
}

#resultado img{
    width: 100%;
    border-radius: 15px;
    box-shadow: 0 0 20px rgba(255,0,0,0.6);
    animation: aparecer 1.5s ease-in-out;
}

@keyframes aparecer{
    from{opacity:0; transform:scale(0.8);}
    to{opacity:1; transform:scale(1);}
}

</style>
</head>

<body>

<div class="container">
    <h2>❤️ Sistema Secreto ❤️</h2>

    <div class="pergunta" id="q1" style="display:block;">
        <p>Aonde nos conhecemos pela primeira vez?</p>
        <input type="text" id="r1">
        <button onclick="verificar1()">Confirmar</button>
    </div>

    <div class="pergunta" id="q2">
        <p>Qual foi a primeira promessa que fizemos?</p>
        <input type="text" id="r2">
        <button onclick="verificar2()">Confirmar</button>
    </div>

    <div class="pergunta" id="q3">
        <p>O que eu mais faço quando você está na faculdade?</p>
        <input type="text" id="r3">
        <button onclick="verificar3()">Confirmar</button>
    </div>

    <div class="pergunta" id="q4">
        <p>Nós dois somos?</p>
        <input type="text" id="r4">
        <button onclick="verificar4()">Confirmar</button>
    </div>

    <div id="resultado">
        <img src="amor.jpg" alt="Texto de Amor">
    </div>

</div>

<script>

function verificar1(){
    let resposta = document.getElementById("r1").value.toLowerCase();
    if(resposta === "ometv"){
        document.getElementById("q2").style.display = "block";
        document.getElementById("q1").style.display = "none";
    } else {
        alert("❤️ Tenta lembrar onde tudo começou...");
    }
}

function verificar2(){
    let resposta = document.getElementById("r2").value.toLowerCase();
    if(resposta === "não se enjoar"){
        document.getElementById("q3").style.display = "block";
        document.getElementById("q2").style.display = "none";
    } else {
        alert("❤️ Essa promessa foi marcante...");
    }
}

function verificar3(){
    let resposta = document.getElementById("r3").value.toLowerCase();
    if(resposta === "academia"){
        document.getElementById("q4").style.display = "block";
        document.getElementById("q3").style.display = "none";
    } else {
        alert("❤️ Pensa no shape 😏");
    }
}

function verificar4(){
    let resposta = document.getElementById("r4").value.toLowerCase();
    if(resposta === "safadinhos"){
        document.getElementById("q4").style.display = "none";
        document.getElementById("resultado").style.display = "block";
    } else {
        alert("❤️ Essa você sabe 😏🔥");
    }
}

</script>

</body>
</html>
